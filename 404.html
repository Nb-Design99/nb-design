<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="404 — Cette page n'existe pas sur NB-Design." />
  <meta name="theme-color" content="#0f2318" />
  <meta name="robots" content="noindex" />
  <title>404 · Page introuvable · NB-Design</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-deep: #061410;
      --green-dark: #0f2318;
      --green-mid: #1a3d2b;
      --green-accent: #2d7a4f;
      --green-light: #4caf78;
      --green-glow: #6ed09a;
      --gold: #c9a84c;
      --gold-light: #e6c875;
      --white: #f8f6f1;
      --white-soft: #ebe7dd;
      --text-muted: rgba(248, 246, 241, 0.62);
      --text-dim: rgba(248, 246, 241, 0.38);
      --bg-dark: #030a06;
      --border-soft: rgba(248, 246, 241, 0.08);
      --border-medium: rgba(248, 246, 241, 0.14);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --radius-full: 9999px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg-dark);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    ::selection { background: rgba(110, 208, 154, 0.3); color: var(--white); }

    /* Header minimal */
    .header-404 {
      padding: 1.75rem clamp(1.25rem, 4vw, 3rem);
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 5;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.4rem;
    }
    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green-accent), var(--green-dark));
      color: var(--white);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.02em;
      border: 1px solid rgba(110, 208, 154, 0.35);
      box-shadow: inset 0 0 12px rgba(110, 208, 154, 0.15);
    }
    .logo-light {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.92rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Main */
    main {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem clamp(1.25rem, 4vw, 3rem) 4rem;
    }

    /* Background shapes */
    .shapes {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .shapes-gradient {
      position: absolute;
      inset: 0;
      background: radial-gradient(60% 50% at 30% 40%, rgba(99, 102, 241, 0.18), transparent 70%),
                  radial-gradient(50% 40% at 75% 65%, rgba(244, 63, 94, 0.10), transparent 70%);
      filter: blur(40px);
    }
    .shape {
      position: absolute;
      border-radius: 9999px;
      border: 2px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), inset 0 0 24px rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      opacity: 0;
      animation: floatIn 2s var(--ease-out) forwards;
    }
    .shape::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.18) 0%, transparent 70%);
      mix-blend-mode: overlay;
    }
    .shape-1 {
      left: -6%; top: 18%;
      width: min(520px, 75vw); height: 120px;
      background: linear-gradient(to right, rgba(99, 102, 241, 0.30), transparent 60%);
      transform: rotate(12deg);
      animation-delay: 0.2s;
    }
    .shape-2 {
      right: -4%; bottom: 12%;
      width: min(420px, 65vw); height: 100px;
      background: linear-gradient(to right, rgba(244, 63, 94, 0.26), transparent 60%);
      transform: rotate(-14deg);
      animation-delay: 0.4s;
    }
    .shape-3 {
      right: 10%; top: 8%;
      width: min(180px, 38vw); height: 50px;
      background: linear-gradient(to right, rgba(245, 158, 11, 0.28), transparent 60%);
      transform: rotate(22deg);
      animation-delay: 0.6s;
    }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(-30px) rotate(var(--rot, 0deg)); }
      to   { opacity: 1; }
    }
    .shape-1, .shape-2, .shape-3 { animation-fill-mode: both; }
    @keyframes float {
      0%, 100% { translate: 0 0; }
      50%      { translate: 0 12px; }
    }
    .shape-1 { animation: floatIn 2s var(--ease-out) 0.2s both, float 14s ease-in-out 2s infinite; }
    .shape-2 { animation: floatIn 2s var(--ease-out) 0.4s both, float 14s ease-in-out 2s infinite; animation-delay: 0.4s, -4s; }
    .shape-3 { animation: floatIn 2s var(--ease-out) 0.6s both, float 14s ease-in-out 2s infinite; animation-delay: 0.6s, -8s; }

    /* Overlay top/bottom fade */
    .overlay-top, .overlay-bottom {
      position: absolute;
      left: 0; right: 0;
      pointer-events: none;
      z-index: 1;
    }
    .overlay-top { top: 0; height: 100px; background: linear-gradient(to bottom, var(--bg-dark), transparent); }
    .overlay-bottom { bottom: 0; height: 140px; background: linear-gradient(to top, var(--bg-dark), transparent); }

    /* Content card */
    .empty {
      position: relative;
      z-index: 3;
      max-width: 560px;
      width: 100%;
      padding: clamp(2rem, 5vw, 3.5rem) clamp(1.5rem, 4vw, 2.5rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border-radius: var(--radius-lg);
      border: 1px dashed var(--border-medium);
      background: rgba(248, 246, 241, 0.015);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      transform: translateY(20px);
      animation: rise 1.1s var(--ease-out) 0.5s forwards;
    }
    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Icon */
    .empty-media {
      position: relative;
      margin-bottom: 1.75rem;
    }
    .empty-icon {
      position: relative;
      width: 56px; height: 56px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: rgba(110, 208, 154, 0.06);
      border: 1px solid rgba(110, 208, 154, 0.22);
      color: var(--green-glow);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 0 16px rgba(110,208,154,0.08);
      z-index: 2;
    }
    .empty-icon svg { width: 28px; height: 28px; }
    .empty-icon-stack {
      position: absolute;
      bottom: 0;
      width: 56px; height: 56px;
      border-radius: 14px;
      background: rgba(110, 208, 154, 0.04);
      border: 1px solid rgba(110, 208, 154, 0.14);
      z-index: 1;
    }
    .empty-icon-stack.left  { transform: rotate(-10deg) translateX(-3px) scale(0.92); }
    .empty-icon-stack.right { transform: rotate(10deg)  translateX(3px)  scale(0.92); }

    /* Big 404 */
    .empty-number {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(5rem, 14vw, 8rem);
      line-height: 1;
      letter-spacing: -0.05em;
      background: linear-gradient(to right, #818cf8 0%, #f8f6f1 50%, #4caf78 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      margin-bottom: 1rem;
      font-style: italic;
    }

    .empty-title {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(1.65rem, 3vw, 2.15rem);
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 0.85rem;
      line-height: 1.15;
    }
    .empty-desc {
      font-family: var(--font-body);
      font-size: clamp(0.98rem, 1.3vw, 1.08rem);
      line-height: 1.6;
      color: var(--text-muted);
      max-width: 420px;
      margin-bottom: 2rem;
    }

    /* Actions */
    .empty-actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 360px;
    }
    @media (min-width: 520px) {
      .empty-actions { flex-direction: row; justify-content: center; }
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.5rem;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.93rem;
      border-radius: var(--radius-full);
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 0.35s var(--ease-out), background 0.3s, border-color 0.3s, box-shadow 0.45s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn svg { width: 16px; height: 16px; transition: transform 0.3s var(--ease-out); }
    .btn-primary {
      background: linear-gradient(135deg, var(--green-accent), var(--green-mid));
      color: var(--white);
      border: 1px solid rgba(110, 208, 154, 0.5);
      box-shadow: 0 0 0 1px rgba(110, 208, 154, 0.1) inset, 0 8px 32px rgba(45, 122, 79, 0.18);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(110, 208, 154, 0.3) inset, 0 12px 40px rgba(45, 122, 79, 0.35), 0 0 60px rgba(110, 208, 154, 0.25);
    }
    .btn-primary:hover svg { transform: scale(1.1); }
    .btn-ghost {
      background: rgba(248, 246, 241, 0.03);
      color: var(--white);
      border: 1px solid var(--border-medium);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .btn-ghost:hover {
      background: rgba(248, 246, 241, 0.08);
      border-color: rgba(248, 246, 241, 0.3);
      transform: translateY(-2px);
    }
    .btn-ghost:hover svg.left { transform: translateX(-4px); }

    /* Footer link */
    .footer-link {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    .footer-link a {
      color: var(--text-muted);
      transition: color 0.3s;
    }
    .footer-link a:hover { color: var(--green-glow); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <header class="header-404">
    <a href="/" class="logo" aria-label="NB-Design — Retour à l'accueil">
      <span class="logo-mark">NB</span>
      <span class="logo-light">Design</span>
    </a>
  </header>

  <main>
    <div class="shapes" aria-hidden="true">
      <div class="shapes-gradient"></div>
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
    <div class="overlay-top"></div>
    <div class="overlay-bottom"></div>

    <div class="empty" role="alert">
      <div class="empty-media">
        <div class="empty-icon-stack left" aria-hidden="true"></div>
        <div class="empty-icon-stack right" aria-hidden="true"></div>
        <div class="empty-icon" aria-hidden="true">
          <!-- Ghost icon (lucide-style) -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 10h.01"/>
            <path d="M15 10h.01"/>
            <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"/>
          </svg>
        </div>
      </div>

      <h1 class="empty-number">404</h1>
      <h2 class="empty-title">Cette page s'est égarée.</h2>
      <p class="empty-desc">
        La page que vous cherchez n'existe pas, ou elle a été déplacée.
        Pas de souci, on vous ramène en lieu sûr.
      </p>

      <div class="empty-actions">
        <a href="/" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Retour à l'accueil
        </a>
        <button onclick="history.length>1 ? history.back() : (location.href='/')" class="btn btn-ghost" type="button">
          <svg class="left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          Page précédente
        </button>
      </div>
    </div>
  </main>

  <div class="footer-link">
    Besoin d'aide ? <a href="/#contact">Contactez-nous</a>
  </div>

</body>
</html>
