<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitrine interactive — Démo NB-Design</title>
  <meta name="description" content="Démo portfolio NB-Design — composant SVG animé en GSAP, vitrine de spécialités hover-driven.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">

  <!-- Preload des 3 images Unsplash version mobile (w=700 q=75) -->
  <link rel="preload" as="image" href="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?ixlib=rb-4.0.3&auto=format&fit=crop&w=700&q=75">
  <link rel="preload" as="image" href="https://images.unsplash.com/photo-1551024601-bec78aea704b?ixlib=rb-4.0.3&auto=format&fit=crop&w=700&q=75">
  <link rel="preload" as="image" href="https://images.unsplash.com/photo-1562376552-0d160a2f238d?ixlib=rb-4.0.3&auto=format&fit=crop&w=700&q=75">

  <style>
    /* ============= Reset minimal ============= */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #18181b;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    ul { list-style: none; margin: 0; padding: 0; }
    h2 { margin: 0; }

    /* ============= Layout ============= */
    .root {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      padding: 2rem;
    }
    @media (min-width: 768px) {
      .root { flex-direction: row; padding: 6rem; }
    }

    /* ============= Menu (gauche) ============= */
    .menu-col { width: 100%; z-index: 20; }
    @media (min-width: 768px) { .menu-col { width: 50%; } }

    .menu { display: flex; flex-direction: column; gap: 2.5rem; }
    @media (min-width: 768px) { .menu { gap: 3.5rem; } }

    .item { cursor: pointer; }
    .item-row { display: flex; align-items: flex-start; gap: 1.25rem; }
    @media (min-width: 768px) { .item-row { gap: 1.5rem; } }

    .num {
      display: inline-block;
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 0.5rem;
      color: #a1a1aa;
      transition: color .4s, transform .4s;
    }
    @media (min-width: 768px) { .num { font-size: 1.875rem; } }
    .item.is-active .num {
      color: #f97316;
      transform: scale(1.1);
    }

    .title {
      font-size: 2.5rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 0.85;
      color: #71717a;
      opacity: .4;
      transform: translateX(0);
      transition: color .5s, opacity .5s, transform .5s;
    }
    @media (min-width: 768px) { .title { font-size: 3.75rem; } }
    @media (min-width: 1024px) { .title { font-size: 4.5rem; } }
    .item.is-active .title {
      color: #09090b;
      opacity: 1;
      transform: translateX(1rem);
    }

    /* ============= SVG (droite) ============= */
    .svg-col {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 3rem;
    }
    @media (min-width: 768px) { .svg-col { width: 50%; margin-top: 0; } }

    .glow {
      position: absolute;
      width: 110%;
      height: 110%;
      background: rgba(249, 115, 22, 0.08);
      /* blur 60px au lieu de 120px → ~4x moins cher en GPU mobile */
      filter: blur(60px);
      border-radius: 50%;
      pointer-events: none;
    }
    @media (min-width: 768px) {
      .glow { filter: blur(100px); background: rgba(249, 115, 22, 0.1); }
    }

    .svg-stage {
      width: 100%;
      max-width: 500px;
      height: auto;
      z-index: 10;
      filter: drop-shadow(0 12px 18px rgba(0,0,0,.15));
    }

    .path { transform-box: fill-box; transform-origin: 50% 50%; }

    /* Réduit les animations si l'utilisateur préfère */
    @media (prefers-reduced-motion: reduce) {
      .num, .title { transition: none; }
    }
  </style>

  <!-- GSAP : defer pour ne pas bloquer le first paint -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

  <main class="root">

    <!-- GAUCHE : MENU -->
    <div class="menu-col">
      <nav>
        <ul id="menu" class="menu">
          <!-- Items injectés par JS -->
        </ul>
      </nav>
    </div>

    <!-- DROITE : SVG ANIMÉ -->
    <div class="svg-col">
      <div class="glow"></div>

      <svg class="svg-stage" viewBox="0 0 500 500">
        <defs>
          <!-- clip-original : silhouette burger -->
          <clipPath id="clip-original">
            <path class="path" d="M480.6,235H19.4c-6,0-10.8-4.9-10.8-10.8v-9.5c0-6,4.9-10.8,10.8-10.8h461.1c6,0,10.8,4.9,10.8,10.8v9.5C491.4,230.2,486.6,235,480.6,235z"/>
            <path class="path" d="M483.1,362.4H16.9c-4.6,0-8.3-3.7-8.3-8.3v-1.8c0-4.6,3.7-8.3,8.3-8.3h466.1c4.6,0,8.3,3.7,8.3,8.3v1.8C491.4,358.7,487.7,362.4,483.1,362.4z"/>
            <path class="path" d="M460.3,336.3H39.7c-17.2,0-31.1-13.9-31.1-31.1v-31.5c0-17.2,13.9-31.1,31.1-31.1h420.7c17.2,0,31.1,13.9,31.1,31.1v31.5C491.4,322.4,477.5,336.3,460.3,336.3z"/>
            <path class="path" d="M459.2,196.2H40.8v-35c0-47.5,38.5-86,86-86h246.5c47.5,0,86,38.5,86,86V196.2z"/>
            <path class="path" d="M441.9,424.9H58.1c-9.6,0-17.3-7.8-17.3-17.3v-37.4h418.5v37.4C459.2,417.1,451.5,424.9,441.9,424.9z"/>
          </clipPath>

          <!-- clip-hexagons : composition de rectangles arrondis -->
          <clipPath id="clip-hexagons">
            <rect class="path" x="20"  y="20"  width="200" height="280" rx="12"/>
            <rect class="path" x="20"  y="320" width="200" height="160" rx="12"/>
            <rect class="path" x="240" y="20"  width="240" height="140" rx="12"/>
            <rect class="path" x="240" y="180" width="110" height="160" rx="12"/>
            <rect class="path" x="370" y="180" width="110" height="160" rx="12"/>
            <rect class="path" x="240" y="360" width="240" height="120" rx="12"/>
          </clipPath>

          <!-- clip-pixels : grille 3x3 -->
          <clipPath id="clip-pixels">
            <rect class="path" x="20"  y="20"  width="140" height="140" rx="4"/>
            <rect class="path" x="180" y="20"  width="140" height="140" rx="4"/>
            <rect class="path" x="340" y="20"  width="140" height="140" rx="4"/>
            <rect class="path" x="20"  y="180" width="140" height="140" rx="4"/>
            <rect class="path" x="180" y="180" width="140" height="140" rx="4"/>
            <rect class="path" x="340" y="180" width="140" height="140" rx="4"/>
            <rect class="path" x="20"  y="340" width="140" height="140" rx="4"/>
            <rect class="path" x="180" y="340" width="140" height="140" rx="4"/>
            <rect class="path" x="340" y="340" width="140" height="140" rx="4"/>
          </clipPath>
        </defs>

        <g id="mainGroup" clip-path="url(#clip-original)">
          <image id="mainImage"
                 href=""
                 width="500" height="500"
                 preserveAspectRatio="xMidYMid slice"/>
        </g>
      </svg>
    </div>
  </main>

  <script>
    // === Données ===
    const items = [
      { num: "01", name: "Burgers Signature",   clipId: "clip-original", image: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?ixlib=rb-4.0.3&auto=format&fit=crop&w=700&q=75" },
      { num: "02", name: "Desserts Maison",     clipId: "clip-hexagons", image: "https://images.unsplash.com/photo-1551024601-bec78aea704b?ixlib=rb-4.0.3&auto=format&fit=crop&w=700&q=75" },
      { num: "03", name: "Gaufres Artisanales", clipId: "clip-pixels",   image: "https://images.unsplash.com/photo-1562376552-0d160a2f238d?ixlib=rb-4.0.3&auto=format&fit=crop&w=700&q=75" }
    ];

    let activeIndex = 0;
    let masterTl    = null;
    const menuEl    = document.getElementById('menu');
    const mainGroup = document.getElementById('mainGroup');
    const mainImage = document.getElementById('mainImage');

    function renderMenu() {
      menuEl.innerHTML = items.map((item, index) => {
        const [first, second] = item.name.split(' ');
        const activeCls = index === activeIndex ? ' is-active' : '';
        return `
          <li data-index="${index}" class="item${activeCls}">
            <div class="item-row">
              <span class="num">${item.num}</span>
              <h2 class="title">${first}<br/>${second || ''}</h2>
            </div>
          </li>
        `;
      }).join('');

      menuEl.querySelectorAll('.item').forEach((li, i) => {
        // mouseenter pour desktop, click/touchstart pour mobile
        li.addEventListener('mouseenter', () => handleHover(i));
        li.addEventListener('click',      () => handleHover(i));
      });
    }

    function createLoop(index) {
      if (typeof gsap === 'undefined') return; // GSAP pas encore chargé
      const item     = items[index];
      const selector = `#${item.clipId} .path`;

      if (masterTl) masterTl.kill();

      mainImage.setAttribute('href', item.image);
      mainGroup.setAttribute('clip-path', `url(#${item.clipId})`);

      gsap.set(selector, { scale: 0, transformOrigin: "50% 50%" });

      const tl = gsap.timeline({ repeat: -1, repeatDelay: 1.2 });

      tl.to(selector, {
        scale: 1,
        duration: 0.8,
        stagger: { amount: 0.4, from: "random" },
        ease: "expo.out",
      })
      .to(selector, {
        scale: 1.05,
        duration: 1.5,
        yoyo: true,
        repeat: 1,
        ease: "sine.inOut",
        stagger: { amount: 0.2, from: "center" }
      })
      .to(selector, {
        scale: 0,
        duration: 0.6,
        stagger: { amount: 0.3, from: "edges" },
        ease: "expo.in",
      });

      masterTl = tl;
    }

    function handleHover(index) {
      if (index === activeIndex) return;
      activeIndex = index;
      // Mise à jour DOM sans re-render complet (perf++)
      menuEl.querySelectorAll('.item').forEach((li, i) => {
        li.classList.toggle('is-active', i === activeIndex);
      });
      createLoop(index);
    }

    // === Init ===
    renderMenu();

    // GSAP chargé en defer → attend DOMContentLoaded + script load
    function boot() {
      if (typeof gsap === 'undefined') {
        setTimeout(boot, 50);
        return;
      }
      createLoop(0);
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }

    // Pause l'animation quand l'onglet est caché (économie CPU/batterie mobile)
    document.addEventListener('visibilitychange', () => {
      if (!masterTl) return;
      if (document.hidden) masterTl.pause();
      else masterTl.resume();
    });
  </script>

</body>
</html>
