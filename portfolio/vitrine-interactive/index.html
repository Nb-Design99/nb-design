<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitrine interactive — Démo NB-Design</title>
  <meta name="description" content="Démo portfolio NB-Design — composant SVG animé en GSAP, vitrine de spécialités hover-driven.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <style>
    html, body { font-family: 'Inter', system-ui, sans-serif; }
    /* Le path SVG dans un clipPath n'est pas rendu — on l'anime via transform */
    clipPath .path { transform-box: fill-box; transform-origin: 50% 50%; }
  </style>
</head>
<body class="antialiased bg-white">

  <main id="root"
        class="flex flex-col md:flex-row items-center justify-between min-h-screen w-full p-8 md:p-24 overflow-hidden transition-colors duration-500 bg-white">

    <!-- GAUCHE : MENU CONTRASTÉ -->
    <div class="z-20 w-full md:w-1/2">
      <nav>
        <ul id="menu" class="flex flex-col gap-14">
          <!-- Items injectés par JS -->
        </ul>
      </nav>
    </div>

    <!-- DROITE : GRILLE SVG ANIMÉE -->
    <div class="relative w-full md:w-1/2 flex justify-center items-center mt-16 md:mt-0">
      <div class="absolute w-[120%] h-[120%] bg-orange-500/10 blur-[120px] rounded-full transition-opacity duration-1000"></div>

      <svg viewBox="0 0 500 500" class="w-full max-w-[500px] h-auto z-10 drop-shadow-xl">
        <defs>

          <!-- clip-original : silhouette de burger -->
          <clipPath id="clip-original">
            <path class="path" d="M480.6,235H19.4c-6,0-10.8-4.9-10.8-10.8v-9.5c0-6,4.9-10.8,10.8-10.8h461.1c6,0,10.8,4.9,10.8,10.8v9.5C491.4,230.2,486.6,235,480.6,235z"/>
            <path class="path" d="M483.1,362.4H16.9c-4.6,0-8.3-3.7-8.3-8.3v-1.8c0-4.6,3.7-8.3,8.3-8.3h466.1c4.6,0,8.3,3.7,8.3,8.3v1.8C491.4,358.7,487.7,362.4,483.1,362.4z"/>
            <path class="path" d="M460.3,336.3H39.7c-17.2,0-31.1-13.9-31.1-31.1v-31.5c0-17.2,13.9-31.1,31.1-31.1h420.7c17.2,0,31.1,13.9,31.1,31.1v31.5C491.4,322.4,477.5,336.3,460.3,336.3z"/>
            <path class="path" d="M459.2,196.2H40.8v-35c0-47.5,38.5-86,86-86h246.5c47.5,0,86,38.5,86,86V196.2z"/>
            <path class="path" d="M441.9,424.9H58.1c-9.6,0-17.3-7.8-17.3-17.3v-37.4h418.5v37.4C459.2,417.1,451.5,424.9,441.9,424.9z"/>
          </clipPath>

          <!-- clip-hexagons : composition en rectangles arrondis -->
          <clipPath id="clip-hexagons">
            <rect class="path" x="20"  y="20"  width="200" height="280" rx="12"/>
            <rect class="path" x="20"  y="320" width="200" height="160" rx="12"/>
            <rect class="path" x="240" y="20"  width="240" height="140" rx="12"/>
            <rect class="path" x="240" y="180" width="110" height="160" rx="12"/>
            <rect class="path" x="370" y="180" width="110" height="160" rx="12"/>
            <rect class="path" x="240" y="360" width="240" height="120" rx="12"/>
          </clipPath>

          <!-- clip-pixels : grille 3x3 de carrés -->
          <clipPath id="clip-pixels">
            <rect class="path" x="20"  y="20"  width="140" height="140" rx="4"/>
            <rect class="path" x="180" y="20"  width="140" height="140" rx="4"/>
            <rect class="path" x="340" y="20"  width="140" height="140" rx="4"/>
            <rect class="path" x="20"  y="180" width="140" height="140" rx="4"/>
            <rect class="path" x="180" y="180" width="140" height="140" rx="4"/>
            <rect class="path" x="340" y="180" width="140" height="140" rx="4"/>
            <rect class="path" x="20"  y="340" width="140" height="140" rx="4"/>
            <rect class="path" x="180" y="340" width="140" height="140" rx="4"/>
            <rect class="path" x="340" y="340" width="140" height="140" rx="4"/>
          </clipPath>
        </defs>

        <g id="mainGroup" clip-path="url(#clip-original)">
          <image id="mainImage"
                 href=""
                 width="500" height="500"
                 preserveAspectRatio="xMidYMid slice"/>
        </g>
      </svg>
    </div>
  </main>

  <script>
    // === Données : noms en français, restaurant suisse ===
    const items = [
      {
        num: "01",
        name: "Burgers Signature",
        clipId: "clip-original",
        image: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"
      },
      {
        num: "02",
        name: "Desserts Maison",
        clipId: "clip-hexagons",
        image: "https://images.unsplash.com/photo-1551024601-bec78aea704b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"
      },
      {
        num: "03",
        name: "Gaufres Artisanales",
        clipId: "clip-pixels",
        image: "https://images.unsplash.com/photo-1562376552-0d160a2f238d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"
      }
    ];

    let activeIndex   = 0;
    let masterTl      = null;
    const menuEl      = document.getElementById('menu');
    const mainGroup   = document.getElementById('mainGroup');
    const mainImage   = document.getElementById('mainImage');

    // Petite helper genre clsx
    const cn = (...c) => c.filter(Boolean).join(' ');

    function renderMenu() {
      menuEl.innerHTML = items.map((item, index) => {
        const isActive = index === activeIndex;
        const [first, second] = item.name.split(' ');

        const numClass = cn(
          "text-3xl font-bold transition-all duration-500 mt-2 inline-block",
          isActive ? "text-orange-500 scale-110" : "text-zinc-400"
        );

        const titleClass = cn(
          "text-5xl md:text-6xl font-black uppercase tracking-tighter leading-[0.85] transition-all duration-700 inline-block",
          isActive
            ? "text-zinc-950 opacity-100 translate-x-4"
            : "opacity-40 translate-x-0 text-zinc-500"
        );

        return `
          <li data-index="${index}" class="group cursor-pointer">
            <div class="flex items-start gap-6">
              <span class="${numClass}">${item.num}</span>
              <h2 class="${titleClass}">
                ${first}<br/>${second || ''}
              </h2>
            </div>
          </li>
        `;
      }).join('');

      // Hover listeners
      menuEl.querySelectorAll('li').forEach((li, i) => {
        li.addEventListener('mouseenter', () => handleHover(i));
      });
    }

    function createLoop(index) {
      const item     = items[index];
      const selector = `#${item.clipId} .path`;

      if (masterTl) masterTl.kill();

      mainImage.setAttribute('href', item.image);
      mainGroup.setAttribute('clip-path', `url(#${item.clipId})`);

      gsap.set(selector, { scale: 0, transformOrigin: "50% 50%" });

      const tl = gsap.timeline({ repeat: -1, repeatDelay: 1 });

      // 1. IN — apparition (Expo Out)
      tl.to(selector, {
        scale: 1,
        duration: 0.8,
        stagger: { amount: 0.4, from: "random" },
        ease: "expo.out",
      })
      // 2. IDLE — respiration (Sine Breath)
      .to(selector, {
        scale: 1.05,
        duration: 1.5,
        yoyo: true,
        repeat: 1,
        ease: "sine.inOut",
        stagger: { amount: 0.2, from: "center" }
      })
      // 3. OUT — disparition (Expo In)
      .to(selector, {
        scale: 0,
        duration: 0.6,
        stagger: { amount: 0.3, from: "edges" },
        ease: "expo.in",
      });

      masterTl = tl;
    }

    function handleHover(index) {
      if (index === activeIndex) return;
      activeIndex = index;
      renderMenu();
      createLoop(index);
    }

    // === Init ===
    renderMenu();
    createLoop(0);
  </script>

</body>
</html>
